<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Sorting algorithm visualizer — random color grid"
    />
    <title>Sorting Visualizer</title>
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <h1 class="header__title">Sorting Visualizer</h1>
        <p class="header__subtitle">Sort colors by hue</p>
        <p class="header__links">
          <a
            class="header__repo-link"
            href="https://github.com/chrisp-bacon2024/Sorting-Visualizer"
            target="_blank"
            rel="noopener noreferrer"
            >View source on GitHub</a
          >
        </p>
      </header>

      <section class="controls" aria-label="Visualizer controls">
        <div class="controls__row">
          <label class="control control--algorithm" for="algorithm">
            <span class="control__label">Algorithm</span>
            <div class="control__field">
              <div class="algo-picker">
                <select
                  id="algorithm"
                  class="algo-picker__native"
                  tabindex="-1"
                  aria-hidden="true"
                ></select>
                <div class="algo-picker__anchor">
                  <button
                    type="button"
                    id="algorithm-trigger"
                    class="algo-picker__trigger control__input control__input--select"
                    aria-haspopup="listbox"
                    aria-expanded="false"
                    aria-controls="algorithm-list"
                  ></button>
                  <ul
                    id="algorithm-list"
                    class="algo-picker__list"
                    role="listbox"
                    hidden
                  ></ul>
                </div>
                <span id="algorithm-measure" class="algorithm-measure" aria-hidden="true"></span>
              </div>
            </div>
            <span class="control__value control__value--spacer" aria-hidden="true"></span>
          </label>

          <label class="control control--compact control--grid-size" for="grid-cols">
            <span class="control__label">Grid size</span>
            <div class="control__field">
              <input
                id="grid-cols"
                class="control__input control__input--range"
                type="range"
                min="5"
                max="100"
                value="20"
              />
              <output id="grid-cols-value" class="control__value" for="grid-cols"
                >20</output
              >
            </div>
            <span class="control__value control__value--spacer" aria-hidden="true"></span>
          </label>

          <label class="control control--compact" for="speed-preset">
            <span class="control__label">Speed</span>
            <div class="control__field">
              <select
                id="speed-preset"
                class="control__input control__input--select"
              ></select>
            </div>
            <span class="control__value control__value--spacer" aria-hidden="true"></span>
          </label>

          <label class="control control--hue" for="show-hue">
            <span class="control__label">Values</span>
            <div class="control__field control__field--checkbox">
              <input
                id="show-hue"
                class="control__checkbox"
                type="checkbox"
                checked
                aria-label="Show hue values on cells"
              />
            </div>
            <span class="control__value control__value--spacer" aria-hidden="true"></span>
          </label>

          <div class="controls__actions" aria-label="Sort actions">
            <div class="control control--action">
              <span class="control__label control__label--hidden" aria-hidden="true"
                >Actions</span
              >
              <div class="control__field">
                <button
                  id="shuffle"
                  class="btn btn--secondary"
                  type="button"
                  aria-label="Shuffle colors"
                >
                  Shuffle
                </button>
              </div>
              <span class="control__value control__value--spacer" aria-hidden="true"></span>
            </div>
            <div class="control control--action">
              <span class="control__label control__label--hidden" aria-hidden="true"
                >Play</span
              >
              <div class="control__field">
                <button
                  id="play-toggle"
                  class="btn btn--icon btn--playback btn--primary"
                  type="button"
                  data-playback="idle"
                  aria-label="Start sorting"
                  title="Start sorting"
                >
                  <svg
                    class="btn__icon btn__icon--play"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="currentColor"
                    xmlns="http://www.w3.org/2000/svg"
                    aria-hidden="true"
                  >
                    <path d="M8 5v14l11-7L8 5z" />
                  </svg>
                  <svg
                    class="btn__icon btn__icon--pause"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="currentColor"
                    xmlns="http://www.w3.org/2000/svg"
                    aria-hidden="true"
                  >
                    <path d="M6 5h4v14H6V5zm8 0h4v14h-4V5z" />
                  </svg>
                </button>
              </div>
              <span class="control__value control__value--spacer" aria-hidden="true"></span>
            </div>
          </div>
        </div>

        <p id="algorithm-description" class="controls__description"></p>

        <div class="controls__playback">
          <label class="control control--playback" for="playback">
            <span class="control__label">Playback</span>
            <div class="control__field">
              <input
                id="playback"
                class="control__input control__input--range"
                type="range"
                min="0"
                max="0"
                value="0"
                disabled
                aria-label="Scrub through sort steps"
              />
            </div>
            <output id="playback-value" class="control__value" for="playback"
              >0 / 0</output
            >
          </label>
        </div>
      </section>

      <main class="main">
        <div class="main__stage">
          <aside
            id="heap-tree-panel"
            class="heap-tree-panel"
            hidden
            aria-label="Heap tree view"
          >
            <canvas id="heap-tree-canvas" aria-hidden="true"></canvas>
          </aside>
          <aside
            id="quick-strip-panel"
            class="quick-strip-panel"
            hidden
            aria-label="Quick sort partition view"
          >
            <canvas id="quick-strip-canvas" aria-hidden="true"></canvas>
          </aside>
          <aside
            id="merge-panel"
            class="merge-panel"
            hidden
            aria-label="Merge sort runs view"
          >
            <canvas id="merge-panel-canvas" aria-hidden="true"></canvas>
          </aside>
          <aside
            id="tim-panel"
            class="tim-panel"
            hidden
            aria-label="Tim sort runs view"
          >
            <canvas id="tim-panel-canvas" aria-hidden="true"></canvas>
          </aside>
          <div class="canvas-container">
            <canvas id="canvas" aria-label="Color grid canvas"></canvas>
          </div>
          <aside
            id="tutorial-bar"
            class="tutorial-panel"
            hidden
            aria-live="polite"
          >
            <div class="tutorial-panel__meta">
              <span id="tutorial-tag" class="tutorial-panel__tag"></span>
              <span id="tutorial-step" class="tutorial-panel__step"></span>
            </div>
            <p id="tutorial-text" class="tutorial-panel__text"></p>
            <span class="tutorial-panel__hint">Space — next key step</span>
          </aside>
        </div>
        <p id="status" class="status" aria-live="polite">Loading…</p>
      </main>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
